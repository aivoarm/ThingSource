[build]
  publish = "public"

# Cache rules
[[headers]]
  for = "/*.html"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

[[headers]]
  for = "/posts.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Functions config
[functions]
  directory = "netlify/functions"
