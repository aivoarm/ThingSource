<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThingSource — Console Login</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #070913;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .login-container {
      max-width: 400px;
      width: 90%;
      padding: 3rem 2.5rem;
      background: rgba(13, 17, 39, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      text-align: center;
      z-index: 10;
      position: relative;
    }
    h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a5b4fc;
      margin-bottom: 0.5rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1.2rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(7, 9, 19, 0.6);
      color: #fff;
      box-sizing: border-box;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      transition: all 0.2s ease;
    }
    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
    }
    button[type="submit"]:active {
      transform: translateY(0);
    }
    .error-container {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Glow Orbs -->
  <div class="glow-orb orb-1" style="width: 400px; height: 400px; left: -100px; top: -100px; background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);"></div>
  <div class="glow-orb orb-2" style="width: 400px; height: 400px; right: -100px; bottom: -100px; background: radial-gradient(circle, rgba(236, 72, 153, 0.12) 0%, transparent 70%);"></div>

  <div class="login-container">
    <div class="logo-dot" style="background: #ef4444; width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-bottom: 1rem; box-shadow: 0 0 10px #ef4444;"></div>
    <h2>ThingSource Console</h2>
    <p class="subtitle">Enter your admin credentials to manage agent research, subscribers, and posts.</p>
    
    <div id="error-box" class="error-container"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="password">Admin Password</label>
        <input type="password" id="password" placeholder="••••••••••••••••" required autofocus autocomplete="current-password">
      </div>
      <button type="submit" id="btn-submit">Unlock Console</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value.trim();
      if (!password) return;

      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerText = 'Authenticating...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success! Keep the token locally in localStorage too for older/fallback client headers (backwards compatibility)
          localStorage.setItem('adminPassword', password);
          // Redirect to admin panel
          window.location.href = '/admin';
        } else {
          errorBox.innerText = data.error || 'Invalid password. Please try again.';
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerText = 'Unlock Console';
        }
      } catch (err) {
        errorBox.innerText = 'Network connection failed. Try again.';
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerText = 'Unlock Console';
      }
    });
  </script>
</body>
</html>
