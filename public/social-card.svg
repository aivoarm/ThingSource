<svg xmlns="http://www.w3.org/2000/svg" 
  width="1200" height="630" viewBox="0 0 1200 630">
  
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" 
      patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D7A6B"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Amber accent bar left -->
  <rect x="80" y="180" width="6" height="80" 
    fill="#F5A623" rx="3"/>
  
  <!-- Label -->
  <text x="104" y="222" 
    font-family="Georgia, serif" 
    font-size="16" 
    fill="rgba(255,255,255,0.65)" 
    letter-spacing="3">
    CURIOUS ORIGINS
  </text>
  
  <!-- Main headline -->
  <text x="104" y="300" 
    font-family="Georgia, serif" 
    font-size="68" 
    font-weight="bold"
    fill="white">
    Where did
  </text>
  <text x="104" y="378" 
    font-family="Georgia, serif" 
    font-size="68" 
    font-weight="bold"
    fill="white">
    that come from?
  </text>
  
  <!-- Subline -->
  <text x="104" y="436" 
    font-family="Georgia, serif" 
    font-size="24" 
    fill="rgba(255,255,255,0.75)">
    One surprising origin story, every morning.
  </text>
  
  <!-- URL -->
  <text x="104" y="550" 
    font-family="Arial, sans-serif" 
    font-size="18" 
    fill="rgba(255,255,255,0.5)">
    thingsource.netlify.app
  </text>
  
  <!-- Large decorative question mark -->
  <text x="820" y="480" 
    font-family="Georgia, serif" 
    font-size="420" 
    font-weight="bold"
    fill="rgba(255,255,255,0.07)"
    text-anchor="middle">
    ?
  </text>
  
  <!-- Amber dot accent -->
  <circle cx="104" cy="540" r="4" fill="#F5A623"/>
  <text x="118" y="545" 
    font-family="Georgia, serif" 
    font-size="18" 
    font-weight="bold"
    fill="white">
    ThingSource
  </text>
</svg>