<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThingSource — Curious Origins & Accidental Genius</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Marked.js for rendering markdown sections -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Background Glowing Orbs -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>

  <!-- Header -->
  <header>
    <div class="header-container">
      <div class="logo">
        <span class="logo-dot"></span>
        <h1>ThingSource</h1>
      </div>
      <div class="subtext" style="font-family: var(--font-display); font-size: 0.9rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">
        Curious Origins
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container">
    
    <!-- Hero Banner (Latest Post) -->
    <div id="latest-post-container" class="hero-post-skeleton">
      <div class="skeleton-image"></div>
      <div class="skeleton-content">
        <div class="skeleton-line tag"></div>
        <div class="skeleton-line title"></div>
        <div class="skeleton-line text"></div>
        <div class="skeleton-line button"></div>
      </div>
    </div>

    <!-- Newsletter Subscription Card (Integrated with Netlify Forms) -->
    <div class="card newsletter-signup-card" style="margin-top: -1.5rem; margin-bottom: 3rem;">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: center; text-align: center; padding: 1rem 0;">
        <h3 style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 0;">Origin Stories in Your Inbox</h3>
        <p class="card-desc" style="margin-bottom: 1rem; max-width: 600px;">Subscribe to get interesting origin research and trivia delivered directly to your inbox when new discoveries are published.</p>
        
        <form id="form-subscribe" name="newsletter" method="POST" data-netlify="true" style="display: flex; gap: 0.75rem; width: 100%; max-width: 500px; flex-wrap: wrap;">
          <input type="hidden" name="form-name" value="newsletter">
          <input type="email" name="email" id="input-subscribe-email" placeholder="Enter your email address" required style="flex-grow: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-glass); background: rgba(7, 9, 19, 0.6); color: #fff;">
          <button type="submit" class="btn btn-primary" style="width: auto; padding: 0.75rem 1.5rem;">Subscribe</button>
        </form>
      </div>
    </div>

    <!-- Feed Grid Header -->
    <div class="feed-header">
      <h2>More Interesting Discoveries</h2>
    </div>

    <!-- Grid of older posts -->
    <div id="posts-grid" class="posts-grid">
      <!-- Will be populated dynamically -->
    </div>

  </main>

  <!-- Modal Article Reader -->
  <div id="reader-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <div id="modal-content" class="modal-content">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>Powered by Gemini Flash. Built in 2026.</p>
  </footer>

  <!-- Public Site Frontend Script -->
  <script src="app.js"></script>
</body>
</html>
