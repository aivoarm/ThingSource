<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThingSource — Curious Origins & Accidental Genius</title>
  
  <!-- Primary Meta -->
  <meta name="description" content="Discover the surprising origins of everyday things. From food to words to customs — one story delivered to your inbox every morning.">
  <link rel="canonical" href="https://thingsource.netlify.app">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ThingSource">
  <meta property="og:title" content="ThingSource — One Curious Origin Story, Every Morning">
  <meta property="og:description" content="Discover the surprising origins of everyday things. From food to words to customs — one story delivered to your inbox every morning.">
  <meta property="og:image" content="https://thingsource.netlify.app/social-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta property="og:url" content="https://thingsource.netlify.app">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ThingSource — One Curious Origin Story, Every Morning">
  <meta name="twitter:description" content="Discover the surprising origins of everyday things. From food to words to customs — one story delivered to your inbox every morning.">
  <meta name="twitter:image" content="https://thingsource.netlify.app/social-card.png">

  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  <!-- Marked.js for rendering markdown sections -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Image defaults and selectors -->
  <script src="js/image-defaults.js"></script>
  <script src="js/images.js"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-container">
      <div class="logo-group" onclick="window.location.href='/'">
        <h1>ThingSource</h1>
        <span class="tagline">Curious Origins</span>
      </div>
      <nav>
        <a href="/blog/" class="nav-btn">Blog</a>
        <a href="#subscribe-section" class="nav-btn btn-subscribe-nav">Subscribe</a>
      </nav>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container">
    
    <!-- Hero Banner (Latest Post) -->
    <div id="latest-post-container">
      <!-- Will be populated dynamically -->
    </div>

    <!-- Newsletter Subscription Card -->
    <div id="subscribe-section" class="subscribe-section-wrapper">
      <h3 class="subscribe-heading">One curious story, every morning.</h3>
      <p class="subscribe-subheading">Join readers who love discovering where things come from.</p>
      
      <div id="subscribe-form-container">
        <form id="form-subscribe" class="subscribe-form">
          <input type="email" id="input-subscribe-email" class="subscribe-input" placeholder="Enter your email address" required>
          <button type="submit" class="subscribe-btn">Subscribe</button>
        </form>
      </div>
      <div class="subscribe-count">
        Join <span id="subscriber-count-val">...</span> curious readers
      </div>
    </div>

    <!-- Feed Grid Header -->
    <div class="feed-header" style="margin-bottom: 2rem;">
      <h2 style="font-family: var(--font-serif); font-size: 1.8rem; color: var(--text-dark);">More Interesting Discoveries</h2>
    </div>

    <!-- Grid of older posts -->
    <div id="posts-grid" class="posts-grid">
      <!-- Will be populated dynamically -->
    </div>

  </main>

  <!-- Modal Article Reader -->
  <div id="reader-modal" class="modal">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-container">
      <button class="modal-close" id="modal-close-btn" onclick="closeModal()">&times;</button>
      <div id="modal-content" class="modal-content">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <div class="footer-logo">
        <h3>ThingSource</h3>
        <span>Curious Origins Daily</span>
      </div>
      <div class="footer-right">
        <a href="/blog/rss.xml">RSS Feed</a>
        <span>&copy; 2026. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <!-- Public Site Frontend Script -->
  <script src="app.js"></script>
</body>
</html>
